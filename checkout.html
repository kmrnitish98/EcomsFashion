<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="./photos&icon/e-icon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <title>Secure Checkout - Ecomus Fashion</title>
  <meta name="description"
    content="Complete your purchase securely at Ecomus. Fast, safe payment processing and free shipping on luxury fashion orders worldwide." />
  <meta name="keywords" content="checkout, secure payment, buy fashion online, Ecomus cart" />
  <meta name="author" content="Ecomus Fashion" />
  <meta name="robots" content="noindex, nofollow" /> <!-- Don't index checkout pages -->
  <style>
    :root {
      --primary-color: #111111;
      --secondary-color: #555555;
      --accent-color: #d4af37;
      --bg-color: #fafafa;
      --glass-bg: rgba(255, 255, 255, 0.85);
      --transition-smooth: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      --border-color: #e5e5e5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Outfit", sans-serif;
      background-color: var(--bg-color);
      color: var(--primary-color);
      overflow-x: hidden;
      line-height: 1.6;
    }

    h1,
    h2,
    h3,
    h4,
    .brand-tital {
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    a {
      text-decoration: none;
      color: inherit;
      transition: var(--transition-smooth);
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 5%;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      transition: padding 0.3s ease;
    }

    .brand-tital {
      font-size: 28px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: -1px;
      background: linear-gradient(45deg, #ff007a, #7928ca, #00f2fe, #ff007a);
      background-size: 300% auto;
      color: transparent !important;
      -webkit-background-clip: text;
      background-clip: text;
      animation: gradientFlow 4s linear infinite;
    }

    .brand-tital .bi {
      font-size: 24px;
      background: inherit;
      color: transparent !important;
      -webkit-background-clip: text;
      background-clip: text;
    }

    @keyframes gradientFlow {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    nav ul {
      display: flex;
      gap: 30px;
      list-style: none;
    }

    nav ul li a {
      font-size: 15px;
      font-weight: 500;
      color: var(--secondary-color);
      position: relative;
    }

    nav ul li a:hover,
    nav ul li a.active {
      color: var(--primary-color);
    }

    nav ul li a::after {
      content: "";
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: var(--primary-color);
      transition: var(--transition-smooth);
    }

    nav ul li a:hover::after,
    nav ul li a.active::after {
      width: 100%;
    }

    .icon-bar {
      display: flex;
      gap: 20px;
    }

    .icon-bar span {
      font-size: 20px;
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .icon-bar span:hover {
      color: var(--accent-color);
      transform: translateY(-2px);
    }

    .navlogo {
      display: none;
      font-size: 28px;
      cursor: pointer;
    }

    /* Checkout Layout */
    .checkout-wrapper {
      margin-top: 100px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      padding: 40px 5%;
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 60px;
      margin-bottom: 80px;
    }

    /* Checkout Form Styling */
    .checkout-form h2 {
      font-size: 2rem;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--primary-color);
      padding-bottom: 15px;
      display: inline-block;
    }

    .form-section {
      margin-bottom: 40px;
    }

    .form-section-title {
      font-size: 1.2rem;
      margin-bottom: 20px;
      font-weight: 600;
      color: var(--primary-color);
    }

    .form-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 0.95rem;
      color: var(--secondary-color);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-control {
      width: 100%;
      padding: 15px;
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      transition: var(--transition-smooth);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.05);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .checkbox-group input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary-color);
      cursor: pointer;
    }

    /* Payment Options */
    .payment-methods {
      border: 1px solid var(--border-color);
      border-radius: 8px;
      overflow: hidden;
    }

    .payment-option {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 15px;
      transition: background 0.3s;
    }

    .payment-option:last-child {
      border-bottom: none;
    }

    .payment-option:hover {
      background: #f9f9f9;
    }

    .payment-option input[type="radio"] {
      accent-color: var(--primary-color);
      width: 18px;
      height: 18px;
    }

    .payment-label {
      font-weight: 500;
      flex: 1;
    }

    .payment-icons-small {
      display: flex;
      gap: 8px;
      color: var(--secondary-color);
      font-size: 1.4rem;
    }

    .btn-submit {
      width: 100%;
      padding: 18px;
      background: var(--primary-color);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-smooth);
      margin-top: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-submit:hover {
      background: var(--accent-color);
      color: var(--primary-color);
      transform: translateY(-2px);
    }

    /* Order Summary Sidebar */
    .order-summary {
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      position: sticky;
      top: 100px;
    }

    .order-summary h3 {
      font-size: 1.5rem;
      margin-bottom: 25px;
    }

    .cart-item {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .cart-item-img {
      width: 80px;
      height: 100px;
      border-radius: 8px;
      overflow: hidden;
      background: #eee;
      flex-shrink: 0;
      position: relative;
    }

    .cart-item-qty {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--primary-color);
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: bold;
      z-index: 2;
    }

    .cart-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cart-item-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .cart-item-title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 5px;
    }

    .cart-item-meta {
      font-size: 0.85rem;
      color: var(--secondary-color);
    }

    .cart-item-price {
      font-weight: 600;
      font-size: 1rem;
    }

    .discount-code {
      display: flex;
      gap: 10px;
      margin: 25px 0;
    }

    .discount-code input {
      flex: 1;
      padding: 12px 15px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-family: inherit;
      outline: none;
    }

    .discount-code input:focus {
      border-color: var(--primary-color);
    }

    .discount-code button {
      background: #f0f0f0;
      border: 1px solid var(--border-color);
      padding: 0 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .discount-code button:hover {
      background: #e0e0e0;
    }

    .summary-totals {
      margin-top: 25px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      color: var(--secondary-color);
      font-size: 1.05rem;
    }

    .summary-row.total {
      color: var(--primary-color);
      font-size: 1.4rem;
      font-weight: 600;
      border-top: 2px solid var(--primary-color);
      padding-top: 20px;
      margin-top: 5px;
    }

    .secure-checkout-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 30px;
      color: #2e7d32;
      font-weight: 500;
      font-size: 0.9rem;
    }

    /* Footer */
    .footer {
      background-color: var(--primary-color);
      color: #fff;
      padding: 80px 5% 30px;
    }

    .footer-container {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1.5fr;
      gap: 40px;
      max-width: 1440px;
      margin: 0 auto;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 50px;
      margin-bottom: 30px;
    }

    .footer-brand {
      color: #fff;
      margin-bottom: 20px;
      font-size: 28px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer-brand .bi {
      color: #fff;
    }

    .footer-text {
      color: #aaa;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 25px;
      max-width: 300px;
    }

    .social-links {
      display: flex;
      gap: 15px;
    }

    .social-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      color: #fff;
      font-size: 1.2rem;
      transition: var(--transition-smooth);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .social-icon:hover {
      background-color: var(--accent-color);
      border-color: var(--accent-color);
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
      color: #111;
    }

    .footer-heading {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 25px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .footer-links-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .footer-links-list li a {
      color: #aaa;
      font-size: 0.95rem;
      transition: var(--transition-smooth);
      position: relative;
      display: inline-block;
    }

    .footer-links-list li a::after {
      content: "";
      position: absolute;
      width: 0;
      height: 1px;
      bottom: -2px;
      left: 0;
      background-color: var(--accent-color);
      transition: width 0.3s ease;
    }

    .footer-links-list li a:hover {
      color: var(--accent-color);
      transform: translateX(5px);
    }

    .footer-links-list li a:hover::after {
      width: 100%;
    }

    .newsletter-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .newsletter-form input {
      padding: 15px 20px;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s;
    }

    .newsletter-form input:focus {
      border-color: var(--accent-color);
    }

    .newsletter-form button {
      padding: 15px 20px;
      background-color: #fff;
      color: var(--primary-color);
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition-smooth);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.9rem;
    }

    .newsletter-form button:hover {
      background-color: var(--accent-color);
      color: #111;
      transform: translateY(-2px);
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1440px;
      margin: 0 auto;
    }

    .payment-icons {
      display: flex;
      gap: 15px;
      font-size: 1.5rem;
      color: #aaa;
    }

    .copyright {
      font-size: 0.9rem;
      color: #777;
    }

    /* Media Queries */
    @media (max-width: 1024px) {
      .checkout-wrapper {
        grid-template-columns: 1fr;
      }

      .order-summary {
        position: static;
      }
    }

    @media (max-width: 768px) {
      .form-row {
        flex-direction: column;
        gap: 0;
      }

      nav ul {
        display: flex;
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: var(--glass-bg);
        backdrop-filter: blur(15px);
        padding: 20px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        clip-path: polygon(0 0, 100% 0, 100% 0, 0 0);
        transition: clip-path 0.4s ease-in-out;
      }

      nav ul.show {
        clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
      }

      nav ul li {
        text-align: center;
        padding: 10px 0;
      }

      .navlogo {
        display: block;
      }

      .footer-container {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .footer-brand {
        justify-content: center !important;
      }

      .footer-text {
        margin: 0 auto 25px;
      }

      .social-links {
        justify-content: center;
      }

      .footer-bottom {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <header id="header">
    <a href="index.html" class="brand-tital">
      <span class="bi bi-browser-edge"></span>comus
    </a>
    <nav>
      <ul id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="product.html">Product</a></li>
        <li><a href="about.html">Pages</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="checkout.html" class="active">Buy Now</a></li>
      </ul>
    </nav>
    <div class="icon-bar">
      <span class="bi bi-search"></span>
      <span class="bi bi-person"></span>
      <span class="bi bi-heart"></span>
      <span class="bi bi-shop"></span>
    </div>
    <div class="navlogo" id="toggle-menu">
      <span class="bi bi-list"></span>
    </div>
  </header>

  <div class="checkout-wrapper">
    <!-- Checkout Form -->
    <div class="checkout-form">
      <h2>Checkout</h2>

      <form action="#" method="POST">
        <!-- Express Checkout (Optional aesthetic) -->
        <div class="form-section">
          <div style="display: flex; gap: 15px; margin-bottom: 30px">
            <div style="
                  flex: 1;
                  background: #000;
                  color: #fff;
                  text-align: center;
                  padding: 12px;
                  border-radius: 8px;
                  cursor: pointer;
                ">
              <i class="bi bi-apple"></i> Pay
            </div>
            <div style="
                  flex: 1;
                  background: #ffc439;
                  color: #000;
                  text-align: center;
                  padding: 12px;
                  border-radius: 8px;
                  cursor: pointer;
                  font-style: italic;
                  font-weight: bold;
                ">
              PayPal
            </div>
            <div style="
                  flex: 1;
                  background: #5a5ce6;
                  color: #fff;
                  text-align: center;
                  padding: 12px;
                  border-radius: 8px;
                  cursor: pointer;
                ">
              <i class="bi bi-google"></i> Pay
            </div>
          </div>
          <div style="
                text-align: center;
                color: var(--secondary-color);
                font-size: 0.9rem;
                position: relative;
                margin-bottom: 30px;
              ">
            <span style="
                  background: var(--bg-color);
                  padding: 0 15px;
                  position: relative;
                  z-index: 2;
                ">OR COTINUE BELOW</span>
            <div style="
                  position: absolute;
                  top: 50%;
                  left: 0;
                  right: 0;
                  height: 1px;
                  background: var(--border-color);
                  z-index: 1;
                "></div>
          </div>
        </div>

        <!-- Contact Information -->
        <div class="form-section">
          <h3 class="form-section-title">Contact Information</h3>
          <div class="form-group">
            <input type="email" class="form-control" placeholder="Email Address" required />
          </div>
          <label class="checkbox-group" style="margin-top: 15px">
            <input type="checkbox" checked />
            <span style="font-size: 0.95rem; color: var(--secondary-color)">Email me with news and offers</span>
          </label>
        </div>

        <!-- Shipping Address -->
        <div class="form-section">
          <h3 class="form-section-title">Shipping Address</h3>

          <div class="form-group" style="margin-bottom: 20px">
            <select class="form-control" required style="cursor: pointer">
              <option value="US">United States</option>
              <option value="UK">United Kingdom</option>
              <option value="CA">Canada</option>
              <option value="AU">Australia</option>
              <option value="IN">India</option>
            </select>
          </div>

          <div class="form-row">
            <div class="form-group">
              <input type="text" class="form-control" placeholder="First Name" required />
            </div>
            <div class="form-group">
              <input type="text" class="form-control" placeholder="Last Name" required />
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 20px">
            <input type="text" class="form-control" placeholder="Address" required />
          </div>

          <div class="form-group" style="margin-bottom: 20px">
            <input type="text" class="form-control" placeholder="Apartment, suite, etc. (optional)" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <input type="text" class="form-control" placeholder="City" required />
            </div>
            <div class="form-group">
              <input type="text" class="form-control" placeholder="State/Province" required />
            </div>
            <div class="form-group">
              <input type="text" class="form-control" placeholder="ZIP/Postal Code" required />
            </div>
          </div>

          <div class="form-group">
            <input type="tel" class="form-control" placeholder="Phone Number" required />
          </div>
        </div>

        <!-- Payment -->
        <div class="form-section">
          <h3 class="form-section-title">Payment</h3>
          <p style="
                font-size: 0.9rem;
                color: var(--secondary-color);
                margin-bottom: 15px;
              ">
            All transactions are secure and encrypted.
